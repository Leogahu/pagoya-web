[build]
  command = "npm run build"
  publish = "dist/pagoya-web/browser"

[build.environment]
  # Angular 21 necesita Node 20+ (recomendado 22)
  NODE_VERSION = "22"

# ─────────────────────────────────────────────────────────────
# PROXY DE LA API (pendiente: descomentar cuando publiques el backend)
#
# La app llama a `/api` (ver src/environments/environment.ts).
# Cuando tengas la URL real del backend, reemplaza BACKEND_URL y
# descomenta este bloque. DEBE ir ANTES del fallback SPA de abajo.
#
# [[redirects]]
#   from = "/api/*"
#   to = "https://BACKEND_URL/api/:splat"
#   status = 200
#   force = true
# ─────────────────────────────────────────────────────────────

# Fallback SPA: cualquier ruta no-archivo sirve index.html
# (necesario para que el routing de Angular funcione al recargar)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
